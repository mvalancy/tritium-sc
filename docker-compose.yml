#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --build tritium    # Rebuild and start
#   docker compose logs -f tritium          # Follow logs
#   docker compose down                     # Stop all

services:
  tritium:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tritium-sc
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Development: mount source for hot reload
      - ./src:/app/src
      # Persistent data
      - tritium_data:/app/data
      - ./assets:/app/assets:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/tritium.db
      - RECORDINGS_PATH=/app/data/recordings
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN:-tritium-dev-token}
      - INFLUX_ORG=${INFLUX_ORG:-tritium}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-telemetry}
      # Auth (disabled by default for dev)
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-}
      - AUTH_ADMIN_PASSWORD=${AUTH_ADMIN_PASSWORD:-}
      # TLS (optional)
      - TLS_ENABLED=${TLS_ENABLED:-false}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-}
      # Rate limiting (optional)
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_started
    # GPU support for YOLO detection
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: tritium-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./conf/mosquitto:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  influxdb:
    image: influxdb:2.7
    container_name: tritium-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:-tritium-sc-2026}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-tritium}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION:-30d}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:-tritium-dev-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  telegraf:
    image: telegraf:1.30
    container_name: tritium-telegraf
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - ./conf/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN:-tritium-dev-token}

  grafana:
    image: grafana/grafana:11.0.0
    container_name: tritium-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-tritium}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  tritium_data:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:

networks:
  default:
    name: tritium
